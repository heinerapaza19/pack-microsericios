name: producto-dev

version: "3.9"

services:
  mysql-producto-dev:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_producto
    ports:
      - "3391:3306" # host → MySQL dev de producto
    volumes:
      - mysql_producto_dev_data:/var/lib/mysql

volumes:
  mysql_producto_dev_data:

